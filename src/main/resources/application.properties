spring.application.name=web-api
server.port=8082

# JWT Configuration
security.jwt.secret-key=${JWT_SECRET_KEY:dGhpcyBpcyBhIHZlcnkgc2VjcmV0IGtleSBmb3IgdGVzdGluZyBwdXJwb3NlczEyMw==}
security.jwt.expiration-time=${JWT_EXPIRATION_TIME:86400000}
security.jwt.access-expiration=${JWT_ACCESS_EXPIRATION:900000}
security.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Default datasource configuration (can be overridden by .env or profile-specific files)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://172.23.240.1:5432/dev_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:dev_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:soklay512}
spring.datasource.driver-class-name=org.postgresql.Driver

# Disable Flyway auto-migration since we handle it manually in MigrationValidator
spring.flyway.enabled=true
spring.flyway.validate-on-migrate=false

# Hibernate configuration - use increment 1 to match database sequences
spring.jpa.hibernate.use-new-id-generator-mappings=false

# HikariCP defaults
spring.datasource.hikari.pool-name=BankPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.auto-commit=false

# Logging configuration
logging.level.org.springframework=INFO
logging.level.com.soklay=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n  

management.health.redis.enabled=false
